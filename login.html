<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Stream Assinaturas</title>
    <meta name="description" content="Acesse sua conta na Stream Assinaturas para gerenciar suas assinaturas digitais.">
    <meta name="robots" content="noindex, nofollow"> 

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📺</text></svg>">

<style>
    :root {
        --primary-color: #E50914;
        --secondary-color: #FFFFFF;
        --background-dark: #101010; 
        --background-medium: #181818; 
        --background-light: #202020; 
        --text-primary: #F5F5F1; 
        --text-secondary: #A0A0A0; 
        --font-family: 'Poppins', sans-serif;
        --transition-speed: 0.3s;
        --base-font-size: 13px; 
        --h1-size: 2.0rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
        font-family: var(--font-family);
        background-color: var(--background-dark);
        color: var(--text-primary);
        line-height: 1.5; 
        font-size: var(--base-font-size);
        display: flex;
        flex-direction: column;
        align-items: center; /* Center content vertically for login */
        justify-content: center; /* Center content horizontally for login */
        padding: 20px;
    }
    .container { width: 100%; max-width: 400px; margin: 0 auto; } 
    a { color: var(--primary-color); text-decoration: none; transition: color var(--transition-speed) ease; }
    a:hover { color: #ff0a18; }
    
    .auth-card {
        background-color: var(--background-medium);
        padding: 30px 35px; /* Increased padding */
        border-radius: 8px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        width: 100%;
    }
    .auth-header {
        text-align: center;
        margin-bottom: 25px;
    }
    .auth-header .logo-auth {
        font-size: 2.2rem; /* Larger logo */
        font-weight: 700;
        color: var(--primary-color);
        letter-spacing: 1px;
        display: block;
        margin-bottom: 10px;
    }
    .auth-header .logo-auth i {
        margin-right: 8px;
    }
    .auth-header h1 {
        font-size: var(--h1-size);
        color: var(--text-primary); /* White title for auth pages */
        margin-bottom: 5px;
    }
    
    /* Form Styles */
    .form-group {
        margin-bottom: 20px;
        position: relative;
    }
    .form-group label {
        display: block;
        font-weight: 500;
        margin-bottom: 6px;
        color: var(--text-secondary);
        font-size: 0.85rem;
    }
    .form-group input[type="tel"],
    .form-group input[type="password"],
    .form-group input[type="text"] {
        width: 100%;
        padding: 12px 15px 12px 45px; /* Space for icon */
        font-size: 0.9rem;
        border: 1px solid var(--background-light);
        background-color: var(--background-dark);
        color: var(--text-primary);
        border-radius: 4px;
        transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
    }
    .form-group input[type="tel"]:focus,
    .form-group input[type="password"]:focus,
    .form-group input[type="text"]:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(229, 9, 20, 0.25); /* More prominent focus */
    }
    .form-group .input-icon {
        position: absolute;
        left: 15px;
        top: calc(50% + 6px); /* Adjust for label height approx */
        transform: translateY(-50%);
        color: var(--text-secondary);
        font-size: 0.9rem;
        pointer-events: none; /* So it doesn't interfere with input click */
    }
    .form-group .btn {
        width: 100%;
        padding: 12px;
        font-size: 0.95rem; /* Slightly larger button text */
        margin-top: 10px; /* Space above button */
    }

    /* Message Area */
    .message-area {
        padding: 12px 15px; /* Larger padding */
        margin-bottom: 20px;
        border-radius: 4px;
        font-size: 0.9rem; /* Larger font */
        text-align: center;
        display: none; 
        border: 1px solid transparent;
    }
    .message-area.success {
        background-color: rgba(60, 179, 113, 0.2); 
        color: #98FB98; /* PaleGreen */
        border-color: #3CB371; /* MediumSeaGreen */
    }
    .message-area.error {
        background-color: rgba(220, 20, 60, 0.2); 
        color: #F08080; /* LightCoral */
        border-color: var(--primary-color); /* Use primary red for error border */
    }

    .auth-footer {
        text-align: center;
        margin-top: 25px;
        font-size: 0.85rem;
        color: var(--text-secondary);
    }
    .auth-footer a {
        font-weight: 600;
    }

    /* Responsive */
     @media (max-width: 480px) {
        .auth-card { padding: 25px 20px; }
        .auth-header .logo-auth { font-size: 1.8rem; }
        .auth-header h1 { font-size: 1.6rem; }
    }

    a:focus, button:focus, [tabindex="0"]:focus { outline: 2px solid var(--primary-color); outline-offset: 2px; }

</style>
</head>
<body>

    <div class="container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="/" class="logo-auth"><i class="fas fa-play-circle"></i>Stream Assinaturas</a>
                <h1>Bem-vindo de Volta!</h1>
            </div>

            <div class="message-area" id="login-message-area"></div>

            <form id="login-form">
                <div class="form-group">
                    <label for="phoneNumber">Número de Telefone</label>
                    <i class="fas fa-phone input-icon"></i>
                    <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="Ex: 841234567" required>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Sua senha" required minlength="6">
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" id="login-btn">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </button>
                </div>
            </form>

            <div class="auth-footer">
                Não tem uma conta? <a href="/register.html">Registe-se aqui</a>
            </div>
        </div>
    </div>

<script>
    const API_BASE_URL = 'https://toppphzhd-1bdbd.onrender.com/api';

    document.addEventListener('DOMContentLoaded', () => {
        // If user is already logged in, redirect them from login page
        const token = localStorage.getItem('authToken');
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect') || '/'; // Default to homepage if no redirect

        if (token) {
            window.location.href = redirectUrl; // Or '/profile.html'
            return;
        }

        const loginForm = document.getElementById('login-form');
        if(loginForm) {
            loginForm.addEventListener('submit', handleLogin);
        }
    });

    async function handleLogin(event) {
        event.preventDefault();
        const messageArea = document.getElementById('login-message-area');
        const loginButton = document.getElementById('login-btn');
        
        const phoneNumber = document.getElementById('phoneNumber').value;
        const password = document.getElementById('password').value;

        showMessage('', 'info', messageArea, true); // Clear previous messages by hiding
        loginButton.disabled = true;
        loginButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> A Entrar...';

        try {
            const response = await fetch(`${API_BASE_URL}/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ phoneNumber, password })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || `Erro ${response.status}: Falha no login.`);
            }

            // Login successful
            localStorage.setItem('authToken', data.token);
            localStorage.setItem('currentUser', JSON.stringify(data.user)); 
            
            showMessage('Login bem-sucedido! Redirecionando...', 'success', messageArea);

            // Determine redirect URL
            const urlParams = new URLSearchParams(window.location.search);
            const redirectUrl = urlParams.get('redirect') || '/'; // Default to homepage

            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 1500); // Delay for user to see success message

        } catch (error) {
            console.error('Erro no login:', error);
            showMessage(error.message || 'Ocorreu um erro. Verifique suas credenciais e tente novamente.', 'error', messageArea);
            loginButton.disabled = false;
            loginButton.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
        }
    }
    
    function showMessage(message, type = 'info', areaElement, hide = false) {
        areaElement.textContent = message;
        areaElement.className = `message-area ${type}`;
        areaElement.style.display = hide ? 'none' : 'block';
    }

</script>

</body>
</html>
